# Development infrastructure only — run the apps on the host with hot reload:
#   docker compose -f compose.dev.yml up -d
#   pnpm install && pnpm db:migrate && pnpm dev
#
# Adds Mailpit (catches magic-link + notification emails at http://localhost:8025)
# and exposes Postgres on 5433 so it never collides with a local Postgres.

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: kloop
      POSTGRES_PASSWORD: kloop
      POSTGRES_DB: kloop
    ports:
      - "5433:5432"
    volumes:
      - kloop-pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kloop -d kloop"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

  minio:
    image: minio/minio:latest
    profiles: ["minio"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - kloop-minio-dev:/data

volumes:
  kloop-pgdata-dev:
  kloop-minio-dev:
